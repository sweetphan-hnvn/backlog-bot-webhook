services:
  - type: web
    name: backlog-translator-webhook
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BACKLOG_API_KEY
        sync: false
      - key: BACKLOG_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
